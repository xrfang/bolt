<!DOCTYPE html>
<html lang="en">
<head>
  <%- header %>
  <title>bolt</title>
</head>
<body>
<nav class="custom-navbar">
    <a href="#" class="navbar-brand"><i class="bi bi-database"></i></a>
    <!-- 这里可以放置 Breadcrumb 或其他内容 -->
    <div class="breadcrumb-container">
    <div class="breadcrumb">
      <span>sample.db</span>
      <span>/</span>
      <a href="#">分类</a>
      <span>/</span>
      <a href="#" class="active">当前页面</a>
    </div>      
    </div>
</nav>
<div id="container">
<div id="leftPanel" style="background: lightblue;"></div>
<div id="divider" style="width: 10px; background: gray; cursor: ew-resize;"></div>
<div id="rightPanel" style="flex-grow: 1; background: lightgreen;"></div>
</div>       
</body>
<script>
const leftPanel = document.getElementById('leftPanel');
const divider = document.getElementById('divider');
let isDragging = false;

divider.addEventListener('mousedown', function(e) {
    e.preventDefault();
    isDragging = true;
});

document.addEventListener('mousemove', function(e) {
    if (isDragging) {
        const newWidth = e.clientX;
        leftPanel.style.width = `${newWidth}px`;
    }
});

document.addEventListener('mouseup', function() {
    isDragging = false;
});

// 防止在拖动时选择页面内容
document.addEventListener('selectstart', function(e) {
    if (isDragging) {
        e.preventDefault();
    }
});
</script>
</html>
